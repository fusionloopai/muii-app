<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Muii — Decision Space</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Caveat:wght@500;600;700&display=swap');

/* ============ FusionLoop tokens — rofa.fusionloop.io dark theme ============ */
:root{
  --fl-yellow:#FF9F2E; --fl-orange:#FF5C1A; --fl-magenta:#E03535; --fl-indigo:#00B4FF;
  --fl-gradient:linear-gradient(135deg,#FF9F2E 0%,#FF5C1A 33%,#E03535 66%,#00B4FF 100%);
  --fl-gradient-cta:linear-gradient(100deg,#FF5C1A 0%,#E03535 100%);
  --fl-gradient-soft:linear-gradient(120deg,rgba(255,159,46,.14) 0%,rgba(0,180,255,.14) 100%);
  --ink:#F2EDE8; --ink-2:#D8CCC4; --ink-3:#8A7570; --ink-4:#6B5A54;
  --line:#2E1A14; --line-2:#3E2820;
  --surface:#0E0A08; --surface-2:#180E0B; --surface-3:#221511; --ink-section:#0B0807;
  --tint-blue:rgba(0,180,255,.10); --tint-peach:rgba(255,159,46,.12); --tint-pink:rgba(224,53,53,.12); --tint-mint:rgba(34,197,94,.12); --tint-violet:rgba(139,92,246,.14);
  --accent:#00B4FF; --hand-blue:#FF9F2E;
  --success:#22C55E; --warning:#FF9F2E; --danger:#EF4444; --danger-tint:rgba(239,68,68,.14);
  --r-xs:8px; --r-sm:12px; --r-md:18px; --r-lg:24px; --r-pill:999px;
  --shadow-sm:0 1px 2px rgba(0,0,0,.4),0 1px 1px rgba(0,0,0,.3);
  --shadow-md:0 8px 24px rgba(0,0,0,.45);
  --shadow-lg:0 18px 50px rgba(0,0,0,.55);
  --shadow-cta:0 10px 28px rgba(255,92,26,.30);
  --header-bg:rgba(14,10,8,.9);
  --font-display:'Poppins',ui-sans-serif,system-ui,sans-serif;
  --font-body:'Poppins',ui-sans-serif,system-ui,sans-serif;
  --font-hand:'Caveat','Bradley Hand',cursive;
}
/* ---------- Light theme — for working outside in daylight ---------- */
:root[data-theme="light"]{
  color-scheme:light;
  --ink:#1A1410; --ink-2:#4A3F38; --ink-3:#7A6A63; --ink-4:#A99790;
  --line:#E8E3DE; --line-2:#DDD6CF;
  --surface:#FFFFFF; --surface-2:#FBF9F7; --surface-3:#F2EEEA;
  --tint-blue:rgba(0,180,255,.10); --tint-peach:rgba(255,159,46,.14); --tint-pink:rgba(224,53,53,.10); --tint-mint:rgba(34,197,94,.12); --tint-violet:rgba(139,92,246,.12);
  --accent:#0369A1; --hand-blue:#B5560A;
  --success:#15803D; --warning:#B5560A; --danger:#B91C1C; --danger-tint:rgba(185,28,28,.10);
  --shadow-sm:0 1px 2px rgba(26,20,16,.06),0 1px 1px rgba(26,20,16,.04);
  --shadow-md:0 8px 24px rgba(26,20,16,.08);
  --shadow-lg:0 18px 50px rgba(26,20,16,.12);
  --shadow-cta:0 10px 28px rgba(255,92,26,.22);
  --header-bg:rgba(255,255,255,.88);
}
:root[data-theme="light"] .pill-open,
:root[data-theme="light"] .chip.on{color:#6D28D9}
:root[data-theme="light"] .pill-little,
:root[data-theme="light"] .hybrid-tag{color:#0369A1}
:root[data-theme="light"] .pill-big,
:root[data-theme="light"] .notice,
:root[data-theme="light"] .risk-md{color:#B5560A}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;color-scheme:dark}
body{background:var(--surface);color:var(--ink);font:400 1rem/1.65 var(--font-body);-webkit-font-smoothing:antialiased}
button{font-family:var(--font-body);cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:var(--font-body);font-size:1rem;color:var(--ink);background:var(--surface-3)}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent)!important;box-shadow:0 0 0 3px rgba(0,180,255,.22)}
::placeholder{color:var(--ink-4)}

.eyebrow{font:600 1.6rem/1 var(--font-hand);color:var(--hand-blue);display:inline-block}
.caps{font:600 .72rem/1 var(--font-body);text-transform:uppercase;letter-spacing:.14em;color:var(--ink-3)}
.h1{font:700 clamp(1.9rem,3.4vw,2.9rem)/1.1 var(--font-display);letter-spacing:-.02em;color:var(--ink)}
.h2{font:700 clamp(1.4rem,2.2vw,1.9rem)/1.15 var(--font-display);letter-spacing:-.015em;color:var(--ink)}
.h3{font:600 1.15rem/1.3 var(--font-display);letter-spacing:-.01em;color:var(--ink)}
.lead{font:400 1.08rem/1.55 var(--font-body);color:var(--ink-2)}
.small{font:400 .875rem/1.5 var(--font-body);color:var(--ink-3)}
.grad-text{background:var(--fl-gradient);-webkit-background-clip:text;background-clip:text;color:transparent}

/* ============ shell ============ */
.topbar{position:sticky;top:0;z-index:50;background:var(--header-bg);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:14px clamp(16px,4vw,40px);display:flex;align-items:center;gap:14px}
.topbar .mark{width:30px;height:31px;flex:none}
.brandname{font:700 1.15rem/1 var(--font-display);letter-spacing:-.01em}
.brandname small{display:block;font:600 .62rem/1 var(--font-body);text-transform:uppercase;letter-spacing:.16em;color:var(--ink-3);margin-top:3px}
.topbar .spacer{flex:1}
.btn{display:inline-flex;align-items:center;gap:8px;border-radius:var(--r-pill);font-weight:600;font-size:.92rem;padding:11px 22px;transition:all .22s ease-out;white-space:nowrap}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--fl-gradient-cta);color:#fff;box-shadow:var(--shadow-cta)}
.btn-primary:hover{filter:brightness(1.06);box-shadow:0 12px 34px rgba(124,42,232,.38)}
.btn-ink{background:var(--ink);color:var(--surface)}
.btn-ink:hover{filter:brightness(1.15)}
.btn-ghost{background:transparent;border:1.5px solid var(--line-2);color:var(--ink-2)}
.btn-ghost:hover{border-color:var(--ink-4);color:var(--ink)}
.btn-sm{padding:7px 14px;font-size:.82rem}
.btn[disabled]{opacity:.45;cursor:not-allowed;box-shadow:none}

main{max-width:1180px;margin:0 auto;padding:clamp(20px,4vw,44px) clamp(16px,4vw,40px) 120px}

/* ============ dashboard ============ */
.hero{text-align:center;padding:26px 0 10px}
.hero .eyebrow{font-size:1.9rem}
.statsrow{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin:26px 0 8px}
.stat{background:var(--surface-2);border:1px solid var(--line);border-radius:var(--r-md);padding:14px 22px;min-width:120px;text-align:center;box-shadow:var(--shadow-sm)}
.stat b{font:700 1.6rem/1.1 var(--font-display);display:block}
.stat span{font-size:.75rem;color:var(--ink-3);text-transform:uppercase;letter-spacing:.1em;font-weight:600}
.tabs{display:flex;gap:8px;justify-content:center;margin:30px 0 26px;flex-wrap:wrap}
.tab{border-radius:var(--r-pill);padding:10px 22px;font-weight:600;font-size:.95rem;color:var(--ink-3);border:1.5px solid transparent;transition:all .2s ease-out}
.tab:hover{color:var(--ink)}
.tab.on{background:var(--ink);color:var(--surface)}
.panel{animation:fadeup .3s ease-out}
@keyframes fadeup{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

.card{background:var(--surface-2);border-radius:var(--r-lg);box-shadow:var(--shadow-md);padding:26px;border:1px solid var(--line)}
.gridcards{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:18px}
.dcard{display:flex;flex-direction:column;gap:12px;transition:all .25s ease-out;position:relative}
.dcard:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.pill{display:inline-flex;align-items:center;gap:6px;border-radius:var(--r-pill);padding:4px 12px;font-size:.72rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.pill-open{background:var(--tint-violet);color:#A78BFA}
.pill-resolved{background:var(--tint-mint);color:var(--success)}
.pill-due{background:var(--danger-tint);color:var(--danger)}
.pill-little{background:var(--tint-blue);color:#00B4FF}
.pill-big{background:var(--tint-peach);color:#FF9F2E}
.pill-unset{background:transparent;color:var(--ink-4);border:1px dashed var(--line-2)}
.progressbar{height:6px;border-radius:99px;background:var(--surface-3);overflow:hidden}
.progressbar i{display:block;height:100%;background:var(--fl-gradient);border-radius:99px;transition:width .35s ease-out}
.dcard .title{font:600 1.12rem/1.3 var(--font-display)}
.dcard .meta{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.dcard .foot{margin-top:auto;display:flex;gap:10px;align-items:center;justify-content:space-between}
.iconbtn{width:34px;height:34px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;color:var(--ink-3);transition:all .2s}
.iconbtn:hover{background:var(--surface-3);color:var(--ink)}
.iconbtn.danger:hover{background:var(--danger-tint);color:var(--danger)}

.empty{text-align:center;padding:56px 20px;color:var(--ink-3)}
.empty .eyebrow{font-size:1.8rem}

/* target lists */
.twocol{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media(max-width:820px){.twocol{grid-template-columns:1fr}}
.list{display:flex;flex-direction:column;gap:8px;margin-top:14px}
.litem{display:flex;align-items:center;gap:10px;background:var(--surface-2);border:1px solid var(--line);border-radius:var(--r-sm);padding:10px 12px;box-shadow:var(--shadow-sm);transition:box-shadow .2s}
.litem.dragging{opacity:.4}
.litem .grip{color:var(--ink-4);cursor:grab;flex:none;display:flex}
.litem .txt{flex:1;line-height:1.4}
.litem .rank{font:700 .8rem/1 var(--font-display);color:var(--ink-4);width:20px;text-align:center;flex:none}
.addrow{display:flex;gap:8px;margin-top:12px}
.addrow input{flex:1;border:1.5px solid var(--line-2);border-radius:var(--r-sm);padding:10px 14px;background:var(--surface-3)}

/* ============ wizard ============ */
.wizwrap{display:grid;grid-template-columns:225px 1fr;gap:28px;align-items:start}
@media(max-width:880px){.wizwrap{grid-template-columns:1fr}}
.rail{position:sticky;top:86px;display:flex;flex-direction:column;gap:2px}
@media(max-width:880px){.rail{position:static;flex-direction:row;overflow-x:auto;padding-bottom:6px}}
.rstep{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--r-sm);color:var(--ink-3);font-size:.9rem;font-weight:500;white-space:nowrap;transition:all .2s}
.rstep .n{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--line-2);display:inline-flex;align-items:center;justify-content:center;font:600 .72rem/1 var(--font-display);flex:none;transition:all .2s}
.rstep.done{color:var(--ink-2)}
.rstep.done .n{background:var(--tint-mint);border-color:transparent;color:var(--success)}
.rstep.now{background:var(--surface-2);color:var(--ink);font-weight:600}
.rstep.now .n{background:var(--ink);border-color:var(--ink);color:var(--surface)}
.rstep.todo{opacity:.65}
.rstep.click{cursor:pointer}
.rstep.click:hover{background:var(--surface-2)}

.coach{background:var(--tint-blue);border:1px solid rgba(0,180,255,.18);border-radius:var(--r-lg);padding:20px 24px;margin-bottom:20px}
.coach .eyebrow{font-size:1.65rem;margin-bottom:2px}
.coach p{color:var(--ink-2);font-size:.95rem;line-height:1.6}
.stepcard{animation:fadeup .3s ease-out}
.stepcard .h2{margin-bottom:6px}
.stepcard>.small{margin-bottom:18px;display:block}
.wizfoot{display:flex;justify-content:space-between;align-items:center;margin-top:26px;gap:12px}
.notice{background:var(--tint-peach);border-radius:var(--r-sm);padding:10px 16px;font-size:.88rem;color:#FF9F2E;margin-top:14px}

.bigadd{display:flex;gap:10px;margin:6px 0 18px}
.bigadd input{flex:1;border:1.5px solid var(--line-2);border-radius:var(--r-sm);padding:13px 16px;font-size:1.02rem;background:var(--surface-3)}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.chip{border-radius:var(--r-pill);border:1.5px solid var(--line-2);padding:6px 14px;font-size:.82rem;font-weight:500;color:var(--ink-3);transition:all .2s}
.chip:hover{border-color:var(--accent);color:var(--accent)}
.chip.on{background:var(--tint-violet);border-color:transparent;color:#A78BFA}

.ocard{background:var(--surface-2);border:1px solid var(--line);border-radius:var(--r-md);padding:14px 16px;box-shadow:var(--shadow-sm);display:flex;flex-direction:column;gap:8px}
.ocard .row{display:flex;align-items:center;gap:10px}
.ocard .txt{flex:1;font-weight:500}
.seg{display:inline-flex;border:1.5px solid var(--line-2);border-radius:var(--r-pill);overflow:hidden;flex:none}
.seg button{padding:5px 13px;font-size:.78rem;font-weight:600;color:var(--ink-3)}
.seg button.on{background:var(--ink);color:var(--surface)}
.seg button.unset{background:transparent;color:var(--ink-4);font-style:italic}
.info{position:relative;display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;border:1.5px solid var(--ink-4);color:var(--ink-3);font:700 .68rem/1 var(--font-display);cursor:help;vertical-align:middle;margin-left:6px}
.info .tip{display:none;position:absolute;bottom:24px;left:50%;transform:translateX(-50%);width:290px;background:var(--surface-3);border:1px solid var(--line-2);border-radius:var(--r-sm);padding:12px 14px;font:400 .82rem/1.55 var(--font-body);color:var(--ink-2);box-shadow:var(--shadow-lg);z-index:20;text-align:left;text-transform:none;letter-spacing:0}
.info:hover .tip,.info:focus .tip{display:block}
.info .tip b{color:var(--ink)}
.reason-in{width:100%;border:1.5px solid var(--line-2);border-radius:var(--r-sm);padding:9px 12px;font-size:.92rem;background:var(--surface-3)}
.reason-in:focus{background:var(--surface-3)}
.line-edit{border:1.5px solid var(--line-2);border-radius:var(--r-xs);padding:6px 10px;background:var(--surface-3);width:100%;min-width:0;font-size:.95rem;color:var(--ink)}

.optgrid{display:flex;flex-direction:column;gap:14px}
.opt{background:var(--surface-2);border:1px solid var(--line);border-radius:var(--r-md);padding:16px 18px;box-shadow:var(--shadow-sm)}
.opt .head{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.opt .name{flex:1;font:600 1.05rem/1.3 var(--font-display)}
.hybrid-tag{background:var(--fl-gradient-soft);color:#00B4FF;border-radius:var(--r-pill);padding:3px 11px;font-size:.7rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
.updown{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:10px}
@media(max-width:680px){.updown{grid-template-columns:1fr}}
.conlist{border-radius:var(--r-sm);padding:12px;background:var(--surface)}
.conlist h5{font:600 .78rem/1 var(--font-body);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.conlist.up h5{color:var(--success)} .conlist.down h5{color:var(--danger)}
.con{display:flex;align-items:center;gap:8px;background:var(--surface-2);border:1px solid var(--line);border-radius:var(--r-xs);padding:7px 10px;margin-bottom:6px;font-size:.9rem;box-shadow:var(--shadow-sm)}
.con .txt{flex:1;line-height:1.35}
.conadd{display:flex;gap:6px;margin-top:8px}
.conadd input{flex:1;border:1.5px solid var(--line-2);border-radius:var(--r-xs);padding:7px 10px;font-size:.88rem;background:var(--surface-3)}
.counter{display:inline-flex;align-items:center;gap:8px;font-size:.9rem;color:var(--ink-3);font-weight:500}
.dots{display:inline-flex;gap:5px}
.dots i{width:10px;height:10px;border-radius:50%;background:var(--surface-3);border:1px solid var(--line-2)}
.dots i.on{background:var(--fl-gradient-cta);border-color:transparent}

/* evaluate */
.evalopt{margin-bottom:22px}
.evalopt .scoreline{display:flex;align-items:center;gap:12px;margin:6px 0 12px}
.scorebar{flex:1;height:10px;border-radius:99px;background:var(--surface-3);overflow:hidden;position:relative}
.scorebar i{position:absolute;top:0;bottom:0;border-radius:99px}
.scorenum{font:700 1rem/1 var(--font-display);min-width:52px;text-align:right}
.evalrow{display:grid;grid-template-columns:1fr 150px 158px;gap:12px;align-items:center;background:var(--surface-2);border:1px solid var(--line);border-radius:var(--r-xs);padding:9px 12px;margin-bottom:7px;box-shadow:var(--shadow-sm);font-size:.9rem}
@media(max-width:680px){.evalrow{grid-template-columns:1fr;gap:6px}}
.evalrow .sign{font-weight:700;margin-right:6px}
.sliderwrap{display:flex;align-items:center;gap:8px}
.sliderwrap output{font:600 .8rem/1 var(--font-display);min-width:38px;text-align:right;color:var(--ink-2)}
input[type=range]{-webkit-appearance:none;width:100%;height:6px;border-radius:99px;background:var(--line-2)}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--ink);border:2px solid var(--accent);box-shadow:var(--shadow-sm);cursor:pointer}
input[type=range]::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:var(--ink);border:2px solid var(--accent);cursor:pointer}
.impactseg{display:inline-flex;border:1.5px solid var(--line-2);border-radius:var(--r-pill);overflow:hidden}
.impactseg button{padding:4px 10px;font-size:.72rem;font-weight:700}
.impactseg button.on{background:var(--ink);color:var(--surface)}

/* mitigate */
.mitrow{background:var(--surface-2);border:1px solid var(--line);border-radius:var(--r-md);padding:14px 16px;margin-bottom:12px;box-shadow:var(--shadow-sm)}
.mitrow .top{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap}
.riskpill{border-radius:var(--r-pill);padding:3px 11px;font-size:.7rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;flex:none}
.risk-hi{background:var(--danger-tint);color:var(--danger)}
.risk-md{background:var(--tint-peach);color:#FF9F2E}
.risk-lo{background:var(--tint-mint);color:var(--success)}
.mitrow textarea{width:100%;border:1.5px solid var(--line-2);border-radius:var(--r-sm);padding:9px 12px;font-size:.9rem;resize:vertical;min-height:44px;background:var(--surface-3)}
.mitrow textarea:focus{background:var(--surface-3)}

/* resolve — the rare dark band */
.resolveband{background:var(--ink-section);border:1px solid var(--line);border-radius:var(--r-lg);padding:clamp(24px,4vw,44px);color:#F2EDE8}
.resolveband .eyebrow{color:#FF9F2E;font-size:1.8rem}
.resolveband .h2{color:#F2EDE8}
.resolveband .small{color:#8A7570}
.choice{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.14);border-radius:var(--r-md);padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:all .2s;color:#fff}
.choice:hover{border-color:rgba(255,255,255,.35)}
.choice.on{border-color:#00B4FF;background:rgba(0,180,255,.14);box-shadow:0 0 0 3px rgba(0,180,255,.25)}
.choice .cname{flex:1;font-weight:600}
.choice .cscore{font:700 .95rem/1 var(--font-display);color:#00B4FF}
.resolveband label.caps{color:#8A7570;display:block;margin:18px 0 8px}
.resolveband input[type=text],.resolveband textarea,.resolveband input[type=date]{width:100%;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.18);border-radius:var(--r-sm);padding:12px 14px;color:#fff;font-size:1rem;resize:vertical}
.resolveband ::placeholder{color:#6B5A54}

/* track logs */
.loglist{margin-top:10px;display:flex;flex-direction:column;gap:6px}
.log{display:flex;gap:10px;align-items:baseline;font-size:.88rem;color:var(--ink-2);background:var(--surface-3);border-radius:var(--r-xs);padding:7px 11px}
.log .d{color:var(--ink-4);font-size:.76rem;flex:none}
.logform{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.logform input{flex:1;min-width:160px;border:1.5px solid var(--line-2);border-radius:var(--r-sm);padding:8px 12px;font-size:.9rem}

/* train */
.quotewall{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;margin-top:20px}
.quote{border-radius:var(--r-lg);padding:22px;font:600 1.35rem/1.35 var(--font-hand);color:var(--ink)}
.quote small{display:block;font:600 .68rem/1 var(--font-body);letter-spacing:.12em;text-transform:uppercase;color:var(--ink-3);margin-top:12px}

.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--surface);border-radius:var(--r-pill);padding:12px 26px;font-weight:600;font-size:.92rem;box-shadow:var(--shadow-lg);z-index:99;animation:fadeup .3s ease-out}
.hairline{height:3px;border-radius:99px;background:var(--fl-gradient);width:64px;margin:0 auto 14px}
.backlink{display:inline-flex;align-items:center;gap:6px;color:var(--ink-3);font-size:.9rem;font-weight:500;margin-bottom:18px;transition:color .2s}
.backlink:hover{color:var(--accent)}
</style>
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
</head>
<body>

<header class="topbar">
  <svg class="mark" style="cursor:pointer" onclick="backToDash()" viewBox="0 0 197 203" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="FusionLoop">
    <path d="M36.0136 0.501282C36.0137 29.3604 59.4091 52.7553 88.2684 52.7553H196.902V88.5081H88.2684L87.131 88.5014C39.4287 87.8973 0.87267 49.341 0.268336 1.63865L0.260742 0.501282H36.0136Z" fill="url(#g1)"></path>
    <path d="M136.398 150.139H88.2686C59.4093 150.139 36.0138 173.535 36.0138 202.394H0.260986C0.260993 154.168 39.0502 115.003 87.1313 114.394L88.2686 114.386H136.398V150.139Z" fill="url(#g2)"></path>
    <defs>
      <linearGradient id="g1" x1="62.9166" y1="-7.57072" x2="187.611" y2="113.432" gradientUnits="userSpaceOnUse">
        <stop stop-color="#E7DB00"></stop><stop offset="0.209135" stop-color="#E16E3A"></stop><stop offset="0.418269" stop-color="#DC0173"></stop><stop offset="0.870192" stop-color="#4846F6"></stop>
      </linearGradient>
      <linearGradient id="g2" x1="48.7712" y1="202.098" x2="159.735" y2="126.026" gradientUnits="userSpaceOnUse">
        <stop stop-color="#E7DB00"></stop><stop offset="0.247596" stop-color="#E26E3A"></stop><stop offset="0.495192" stop-color="#DC0173"></stop><stop offset="1" stop-color="#4846F6"></stop>
      </linearGradient>
    </defs>
  </svg>
  <div class="brandname" style="cursor:pointer" onclick="backToDash()">Muii<small>Decision Space · muii.app</small></div>
  <div class="spacer"></div>
  <button class="btn btn-ghost btn-sm" onclick="backToDash()"><i class="ph ph-squares-four"></i> Decision Dashboard</button>
  <button class="btn btn-ghost btn-sm" id="theme-toggle" onclick="toggleTheme()" title="Switch between light and dark"><i class="ph ph-sun"></i> Light</button>
  <button class="btn btn-ghost btn-sm" onclick="exportJSON()"><i class="ph ph-download-simple"></i> Export</button>
  <button class="btn btn-ghost btn-sm" onclick="document.getElementById('importfile').click()"><i class="ph ph-upload-simple"></i> Import</button>
  <button class="btn btn-primary btn-sm" onclick="newDecision()"><i class="ph ph-plus"></i> New Decision</button>
</header>
<input type="file" id="importfile" accept="application/json" style="display:none" onchange="importJSON(event)">

<main id="app"></main>

<script>
/* =====================================================================
   Muii (muii.app) — Decision Space — v1
   The OOROCEMR flow, from Tony Robbins' OCEMR + Josh Holladay's notes:
   Outcomes → Reasons → Order → Options → Consequences → Evaluate →
   Mitigate → Resolve → Track.
   All data lives in the browser (localStorage) + JSON export/import.
   ===================================================================== */

const STORE_KEY = 'muii-v1';
const uid = () => Math.random().toString(36).slice(2, 10);
const today = () => new Date().toISOString().slice(0, 10);
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function blankState() {
  return { version: 1, decisions: [], targets: { now: [], horizon: [] }, trims: [] };
}
function load() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (!raw) return blankState();
    const s = JSON.parse(raw);
    if (!s || !Array.isArray(s.decisions)) return blankState();
    s.targets = s.targets || { now: [], horizon: [] };
    s.trims = s.trims || [];
    return s;
  } catch (e) { return blankState(); }
}
let state = load();
function save() { localStorage.setItem(STORE_KEY, JSON.stringify(state)); }

let route = { view: 'dashboard', tab: 'track', decisionId: null };
const findD = id => state.decisions.find(d => d.id === id);

/* ---------------- steps + coach copy ---------------- */
const STEPS = [
  { key: 'frame', label: 'Name It', icon: 'ph-crosshair',
    eyebrow: 'Make The Call',
    coach: 'What’s one decision that would increase the quality of your life — one you’ve maybe been putting off? Little or big. Name it. Writing it down gets it out of your head, and that’s where overwhelm ends.' },
  { key: 'outcomes', label: 'Outcomes', icon: 'ph-star',
    eyebrow: 'Start With What You Want',
    coach: 'Not what you’re afraid of — what you want. Experiences, things, who you want around you, what you want to create for others. If a decision feels hard, it’s usually because you’re chasing several outcomes at once. List them all here, one at a time.' },
  { key: 'reasons', label: 'Reasons', icon: 'ph-heart',
    eyebrow: 'The Why Is What Matters',
    coach: 'For each outcome: what will it actually give you? Joy, freedom, security, fulfillment, growth? The reason is the fuel. Pull motivation beats push motivation — find the why that pulls you.' },
  { key: 'order', label: 'Order', icon: 'ph-sort-ascending',
    eyebrow: 'Be Rigorous',
    coach: 'For this season of your life, what matters most right now? Drag your outcomes into order. What’s number one? You can’t optimize for everything at once — and your “later” outcomes stay on the Target list so the future never gets lost.' },
  { key: 'options', label: 'Options', icon: 'ph-git-branch',
    eyebrow: 'Three To Be A Choice',
    coach: 'One option is no option. Two options is a dilemma. You need at least three for it to be a real choice — and once you find three, a fourth and fifth usually show up. You don’t have to like them all; you just can’t lie to yourself that they don’t exist.' },
  { key: 'consequences', label: 'Consequences', icon: 'ph-scales',
    eyebrow: 'Upsides & Downsides',
    coach: 'For each option: to the best of your knowledge, what are the upsides? What are the downsides? Get them out of your head and onto the page — a picture is worth a thousand spinning thoughts.' },
  { key: 'evaluate', label: 'Evaluate', icon: 'ph-percent',
    eyebrow: 'How Likely, Really?',
    coach: 'A terrifying downside with near-zero probability shouldn’t run your life. A glorious upside that will never happen shouldn’t either. Set the probability and the impact of each consequence, and watch the real picture appear.' },
  { key: 'mitigate', label: 'Mitigate', icon: 'ph-shield-check',
    eyebrow: 'Shrink The Risk',
    coach: 'Could you take something from one option and mix it with another? Is there a way to reduce each downside? There almost always is — and this is where your brain gets creative, because the fear is on the page instead of in your head.' },
  { key: 'resolve', label: 'Resolve', icon: 'ph-flag-checkered',
    eyebrow: 'Decide. Commit. Follow Through.',
    coach: 'Resolve isn’t a side note — it’s the step that makes the whole system work. Choose, commit, take one action today, and set a date to review the results. Treat it like a test: decide, act, measure, adjust.' },
];

const QUOTES = [
  { t: 'One option is no option. Two options is a dilemma. Three is a choice.', s: 'Options' },
  { t: 'Start with what you want — not what you’re afraid of.', s: 'Outcomes' },
  { t: 'Don’t do this in your head. A picture is worth a thousand words.', s: 'Write it down' },
  { t: 'Unless you evaluate probability, you’re wasting your time.', s: 'Evaluate' },
  { t: 'Problems are a sign of life.', s: 'Norman Vincent Peale' },
  { t: 'We don’t experience life. We experience the life we focus on.', s: 'Focus' },
  { t: 'Decide. Commit. Resolve.', s: 'Follow through' },
  { t: 'You don’t have to like your options — you just can’t pretend they don’t exist.', s: 'Honesty' },
];

const tintCycle = ['var(--tint-blue)', 'var(--tint-peach)', 'var(--tint-pink)', 'var(--tint-mint)', 'var(--tint-violet)'];

/* ---------------- scoring ---------------- */
function optionScore(o) {
  const sum = arr => (arr || []).reduce((a, c) => a + (c.prob / 100) * c.impact, 0);
  const up = sum(o.ups), down = sum(o.downs);
  return { up, down, net: up - down };
}
function riskOf(c) { return (c.prob / 100) * c.impact; }
function riskClass(r) { return r >= 1.8 ? 'risk-hi' : r >= 0.9 ? 'risk-md' : 'risk-lo'; }
function riskLabel(r) { return r >= 1.8 ? 'High risk' : r >= 0.9 ? 'Medium' : 'Low'; }

/* ---------------- render root ---------------- */
function render() {
  const app = document.getElementById('app');
  if (route.view === 'wizard') app.innerHTML = renderWizard();
  else app.innerHTML = renderDashboard();
  wireDrag();
}

/* =====================================================================
   DASHBOARD — Track · Target · Trim · Train
   ===================================================================== */
function renderDashboard() {
  const ds = state.decisions;
  const open = ds.filter(d => d.status === 'open');
  const resolved = ds.filter(d => d.status === 'resolved');
  const dueReviews = resolved.filter(d => d.resolution && d.resolution.reviewDate && d.resolution.reviewDate <= today() && !d.reviewDone);
  const tabs = [
    ['track', 'Track', 'ph-path'],
    ['target', 'Target', 'ph-crosshair-simple'],
    ['trim', 'Trim', 'ph-scissors'],
    ['train', 'Train', 'ph-barbell'],
  ];
  return `
  <div class="hero">
    <span class="eyebrow">One Decision At A Time</span>
    <div class="hairline" style="margin-top:10px"></div>
    <h1 class="h1">Make The Call.</h1>
    <p class="lead" style="max-width:560px;margin:10px auto 0">Life gets better when you stop managing circumstances and start <b>creating</b> them. Decide, commit, follow through.</p>
    <div class="statsrow">
      <div class="stat"><b>${open.length}</b><span>In Progress</span></div>
      <div class="stat"><b>${resolved.length}</b><span>Resolved</span></div>
      <div class="stat"><b>${state.targets.now.length + state.targets.horizon.length}</b><span>Targets</span></div>
      <div class="stat"><b style="${dueReviews.length ? 'color:var(--danger)' : ''}">${dueReviews.length}</b><span>Reviews Due</span></div>
    </div>
  </div>
  <nav class="tabs">${tabs.map(([k, l, ic]) =>
    `<button class="tab ${route.tab === k ? 'on' : ''}" onclick="setTab('${k}')"><i class="ph ${ic}"></i> ${l}</button>`).join('')}
  </nav>
  <section class="panel">${{ track: renderTrack, target: renderTarget, trim: renderTrim, train: renderTrain }[route.tab]()}</section>`;
}
function setTab(t) { route.tab = t; render(); }

/* ---------- TRACK ---------- */
function renderTrack() {
  if (!state.decisions.length) {
    return `<div class="empty card">
      <span class="eyebrow">Your First Rep</span>
      <h2 class="h2" style="margin:8px 0">What’s one little decision you’ve been putting off?</h2>
      <p style="max-width:480px;margin:0 auto 20px">Decision-making is a skill — and the only way to build it is to start making some decisions. The coach will walk you through it, one step at a time.</p>
      <button class="btn btn-primary" onclick="newDecision()"><i class="ph ph-plus"></i> Start Your First Decision</button>
    </div>`;
  }
  const sorted = [...state.decisions].sort((a, b) => (a.status === b.status ? (b.createdAt || '').localeCompare(a.createdAt || '') : a.status === 'open' ? -1 : 1));
  return `<div class="gridcards">${sorted.map(dcardHTML).join('')}</div>`;
}
function dcardHTML(d) {
  const pct = d.status === 'resolved' ? 100 : Math.round((d.step / (STEPS.length - 1)) * 100);
  const chosen = d.resolution ? (d.options.find(o => o.id === d.resolution.optionId) || {}).text : null;
  const due = d.status === 'resolved' && d.resolution && d.resolution.reviewDate && d.resolution.reviewDate <= today() && !d.reviewDone;
  const top = d.outcomes[0];
  return `<article class="card dcard">
    <div class="meta">
      <span class="pill ${d.status === 'open' ? 'pill-open' : 'pill-resolved'}">${d.status === 'open' ? 'In progress' : 'Resolved'}</span>
      <span class="pill ${d.size === 'big' ? 'pill-big' : 'pill-little'}">${d.size === 'big' ? 'Big' : 'Little'}</span>
      ${due ? '<span class="pill pill-due">Review due</span>' : ''}
      <span style="flex:1"></span>
      <button class="iconbtn danger" title="Delete" onclick="deleteDecision('${d.id}')"><i class="ph ph-trash"></i></button>
    </div>
    <div class="title">${esc(d.title)}</div>
    ${d.status === 'open' ? `
      <div class="small">Step ${d.step + 1} of ${STEPS.length} — ${STEPS[d.step].label}${top ? ` · #1: ${esc(top.text)}` : ''}</div>
      <div class="progressbar"><i style="width:${pct}%"></i></div>
      <div class="foot"><span class="small">${d.options.length} option${d.options.length === 1 ? '' : 's'}</span>
        <button class="btn btn-ink btn-sm" onclick="openWizard('${d.id}')">Continue <i class="ph ph-arrow-right"></i></button></div>`
    : `
      <div class="small"><i class="ph ph-check-circle" style="color:var(--success)"></i> Chose: <b style="color:var(--ink)">${esc(chosen || '—')}</b></div>
      ${d.resolution && d.resolution.firstAction ? `<div class="small">First action: ${esc(d.resolution.firstAction)}</div>` : ''}
      ${d.resolution && d.resolution.reviewDate ? `<div class="small">Review: ${d.resolution.reviewDate}${d.reviewDone ? ' · done' : ''}</div>` : ''}
      ${d.logs && d.logs.length ? `<div class="loglist">${d.logs.slice(-3).map(l =>
        `<div class="log"><span class="d">${l.date}</span><span>${l.status === 'on' ? '<i class="ph ph-trend-up" style="color:var(--success)"></i>' : l.status === 'off' ? '<i class="ph ph-trend-down" style="color:var(--danger)"></i>' : ''} ${esc(l.note)}</span></div>`).join('')}</div>` : ''}
      <form class="logform" onsubmit="return addLog(event,'${d.id}')">
        <input name="note" placeholder="Log a result…" required>
        <select name="status" style="border:1.5px solid var(--line-2);border-radius:var(--r-sm);padding:8px 10px;font-size:.85rem">
          <option value="on">On track</option><option value="off">Off track</option><option value="note">Note</option>
        </select>
        <button class="btn btn-ghost btn-sm" type="submit"><i class="ph ph-plus"></i></button>
      </form>
      <div class="foot">
        ${due ? `<button class="btn btn-primary btn-sm" onclick="markReviewed('${d.id}')"><i class="ph ph-check"></i> Mark reviewed</button>` : '<span></span>'}
        <button class="btn btn-ghost btn-sm" onclick="openWizard('${d.id}')">Open <i class="ph ph-arrow-right"></i></button>
      </div>`}
  </article>`;
}

/* ---------- TARGET ---------- */
function renderTarget() {
  const listHTML = (key, items) => items.length
    ? `<div class="list" data-drag="target-${key}">${items.map((t, i) => `
        <div class="litem" draggable="true" data-id="${t.id}">
          <span class="grip"><i class="ph ph-dots-six-vertical"></i></span>
          <span class="rank">${i + 1}</span>
          <input class="txt line-edit" type="text" value="${esc(t.text)}" oninput="upTargetText('${key}','${t.id}',this.value)">
          <button class="iconbtn danger" onclick="removeTarget('${key}','${t.id}')"><i class="ph ph-x"></i></button>
        </div>`).join('')}</div>`
    : `<p class="small" style="margin-top:14px">Nothing here yet — add one below.</p>`;
  return `
  <div class="twocol">
    <div class="card">
      <span class="eyebrow">This Season</span>
      <h3 class="h3">Now — what matters most right now</h3>
      ${listHTML('now', state.targets.now)}
      <form class="addrow" onsubmit="return addTarget(event,'now')">
        <input name="text" placeholder="Add a near-term outcome…" required>
        <button class="btn btn-ink btn-sm" type="submit"><i class="ph ph-plus"></i> Add</button>
      </form>
    </div>
    <div class="card">
      <span class="eyebrow">The Long Game</span>
      <h3 class="h3">Horizon — so the future never gets lost</h3>
      ${listHTML('horizon', state.targets.horizon)}
      <form class="addrow" onsubmit="return addTarget(event,'horizon')">
        <input name="text" placeholder="Add a long-term outcome…" required>
        <button class="btn btn-ink btn-sm" type="submit"><i class="ph ph-plus"></i> Add</button>
      </form>
    </div>
  </div>
  <p class="small" style="text-align:center;margin-top:18px">Drag to reorder. If you always sort by “what’s needed now,” the future never gets prioritized — keeping two lists keeps both honest.</p>`;
}
function addTarget(e, key) {
  e.preventDefault();
  const v = e.target.text.value.trim();
  if (v) { state.targets[key].push({ id: uid(), text: v }); save(); render(); }
  return false;
}
function upTargetText(key, id, v) {
  const t = state.targets[key].find(x => x.id === id);
  if (t) { t.text = v; save(); }
}
function removeTarget(key, id) {
  state.targets[key] = state.targets[key].filter(t => t.id !== id); save(); render();
}

/* ---------- TRIM ---------- */
function renderTrim() {
  return `<div class="card" style="max-width:720px;margin:0 auto">
    <span class="eyebrow">Cut With Confidence</span>
    <h3 class="h3">The Trim List — paths you chose <em>not</em> to take</h3>
    <p class="small" style="margin-top:6px">Every resolved decision trims the options you didn’t choose. They land here — on purpose, on the record, so they stop haunting you. Add anything else you’re saying no to.</p>
    ${state.trims.length ? `<div class="list">${state.trims.map(t => `
      <div class="litem">
        <span class="grip" style="cursor:default"><i class="ph ph-scissors"></i></span>
        <span class="txt" style="display:flex;flex-direction:column;gap:5px">
          <input class="line-edit" type="text" value="${esc(t.text)}" oninput="upTrimText('${t.id}',this.value)">
          <span class="small">${t.from ? `from “${esc(t.from)}” · ${t.date}` : t.date}</span>
        </span>
        <button class="iconbtn danger" onclick="removeTrim('${t.id}')"><i class="ph ph-x"></i></button>
      </div>`).join('')}</div>` : '<p class="small" style="margin-top:14px">Nothing trimmed yet.</p>'}
    <form class="addrow" onsubmit="return addTrim(event)">
      <input name="text" placeholder="Something you’re saying no to…" required>
      <button class="btn btn-ink btn-sm" type="submit"><i class="ph ph-plus"></i> Trim it</button>
    </form>
  </div>`;
}
function addTrim(e) {
  e.preventDefault();
  const v = e.target.text.value.trim();
  if (v) { state.trims.unshift({ id: uid(), text: v, from: null, date: today() }); save(); render(); }
  return false;
}
function upTrimText(id, v) {
  const t = state.trims.find(x => x.id === id);
  if (t) { t.text = v; save(); }
}
function removeTrim(id) { state.trims = state.trims.filter(t => t.id !== id); save(); render(); }

/* ---------- TRAIN ---------- */
function renderTrain() {
  const ds = state.decisions;
  const resolved = ds.filter(d => d.status === 'resolved');
  const logs = ds.reduce((a, d) => a + (d.logs ? d.logs.length : 0), 0);
  const avgOpts = ds.length ? (ds.reduce((a, d) => a + d.options.length, 0) / ds.length).toFixed(1) : '0';
  return `
  <div style="text-align:center;margin-bottom:8px">
    <span class="eyebrow">Skill: Decision Making</span>
    <p class="lead" style="max-width:560px;margin:8px auto 0">Every decision is a rep. You get stronger by pushing against resistance — that’s how the muscle gets built.</p>
  </div>
  <div class="statsrow">
    <div class="stat"><b>${ds.length}</b><span>Decisions</span></div>
    <div class="stat"><b>${resolved.length}</b><span>Committed</span></div>
    <div class="stat"><b>${avgOpts}</b><span>Avg options</span></div>
    <div class="stat"><b>${logs}</b><span>Results logged</span></div>
    <div class="stat"><b>${state.trims.length}</b><span>Trimmed</span></div>
  </div>
  <div class="quotewall">${QUOTES.map((q, i) =>
    `<div class="quote" style="background:${tintCycle[i % tintCycle.length]}">“${q.t}”<small>${q.s}</small></div>`).join('')}
  </div>`;
}

/* =====================================================================
   WIZARD
   ===================================================================== */
function newDecision() {
  const d = {
    id: uid(), title: '', size: 'little', note: '', createdAt: today(),
    status: 'open', step: 0, outcomes: [], options: [], resolution: null, logs: [],
  };
  state.decisions.unshift(d); save();
  route = { view: 'wizard', tab: route.tab, decisionId: d.id };
  render();
  focusFirst();
}
function openWizard(id) {
  route = { view: 'wizard', tab: route.tab, decisionId: id };
  render();
  window.scrollTo({ top: 0 });
}
function backToDash() {
  const d = findD(route.decisionId);
  if (d && d.status === 'open' && !d.title.trim()) {
    state.decisions = state.decisions.filter(x => x.id !== d.id); // discard unnamed drafts
    save();
  }
  route = { view: 'dashboard', tab: route.tab, decisionId: null };
  render();
}
function deleteDecision(id) {
  const d = findD(id);
  if (!d) return;
  if (confirm(`Delete “${d.title || 'this decision'}”? This can’t be undone.`)) {
    state.decisions = state.decisions.filter(x => x.id !== id); save(); render();
  }
}

function renderWizard() {
  const d = findD(route.decisionId);
  if (!d) { route.view = 'dashboard'; return renderDashboard(); }
  const s = STEPS[d.step];
  const railHTML = STEPS.map((st, i) => {
    const cls = i < d.step ? 'done' : i === d.step ? 'now' : 'todo';
    const clickable = i <= maxReached(d) ? 'click' : '';
    return `<div class="rstep ${cls} ${clickable}" ${clickable ? `onclick="gotoStep(${i})"` : ''}>
      <span class="n">${i < d.step ? '<i class="ph ph-check"></i>' : i + 1}</span>${st.label}</div>`;
  }).join('');
  const bodyFns = [stepFrame, stepOutcomes, stepReasons, stepOrder, stepOptions, stepConsequences, stepEvaluate, stepMitigate, stepResolve];
  const gate = gateFor(d);
  return `
  <a class="backlink" onclick="backToDash()"><i class="ph ph-arrow-left"></i> Muii</a>
  <div class="wizwrap">
    <aside class="rail">${railHTML}</aside>
    <div>
      <div class="coach">
        <span class="eyebrow">${s.eyebrow}</span>
        <p>${s.coach}</p>
      </div>
      <div class="card stepcard">${bodyFns[d.step](d)}</div>
      <div class="wizfoot">
        <button class="btn btn-ghost" onclick="prevStep()" ${d.step === 0 ? 'style="visibility:hidden"' : ''}><i class="ph ph-arrow-left"></i> Back</button>
        ${d.step < STEPS.length - 1
          ? `<button class="btn btn-ink" onclick="nextStep()" ${gate ? 'disabled' : ''}>Continue <i class="ph ph-arrow-right"></i></button>`
          : ''}
      </div>
      ${gate ? `<div class="notice"><i class="ph ph-hand-palm"></i> ${gate}</div>` : ''}
    </div>
  </div>`;
}
function maxReached(d) { return d.maxStep != null ? Math.max(d.maxStep, d.step) : d.step; }
function gotoStep(i) {
  const d = findD(route.decisionId);
  d.step = i; save(); render(); window.scrollTo({ top: 0 });
}
function nextStep() {
  const d = findD(route.decisionId);
  if (gateFor(d)) return;
  d.step = Math.min(d.step + 1, STEPS.length - 1);
  d.maxStep = Math.max(d.maxStep || 0, d.step);
  save(); render(); window.scrollTo({ top: 0 }); focusFirst();
}
function prevStep() {
  const d = findD(route.decisionId);
  d.step = Math.max(d.step - 1, 0); save(); render(); window.scrollTo({ top: 0 });
}
function gateFor(d) {
  switch (STEPS[d.step].key) {
    case 'frame': return d.title.trim() ? null : 'Name the decision to continue.';
    case 'outcomes': return d.outcomes.length ? null : 'Add at least one outcome — what do you want?';
    case 'options': return d.options.length >= 3 ? null :
      `${d.options.length === 0 ? 'One option is no option.' : d.options.length === 1 ? 'One option is no option — keep going.' : 'Two options is a dilemma.'} Add ${3 - d.options.length} more to make it a real choice.`;
    case 'consequences': {
      const missing = d.options.filter(o => !(o.ups.length + o.downs.length));
      return missing.length ? `Every option needs at least one upside or downside (${missing.length} still blank).` : null;
    }
    default: return null;
  }
}
function focusFirst() {
  setTimeout(() => { const el = document.querySelector('.stepcard input[type=text], .stepcard input:not([type]), .stepcard textarea'); if (el) el.focus(); }, 60);
}

/* ---------- step 0: frame ---------- */
function stepFrame(d) {
  return `
  <h2 class="h2">What’s the decision?</h2>
  <span class="small">One sentence. Get it out of your head.</span>
  <div class="bigadd" style="margin-top:14px">
    <input type="text" value="${esc(d.title)}" placeholder="e.g. Do I hire help for client delivery?" oninput="upTitle(this.value)">
  </div>
  <label class="caps" style="display:block;margin:16px 0 10px">How big is this?</label>
  <div class="seg">
    <button class="${d.size === 'little' ? 'on' : ''}" onclick="upSize('little')">Little decision</button>
    <button class="${d.size === 'big' ? 'on' : ''}" onclick="upSize('big')">Big decision</button>
  </div>
  <label class="caps" style="display:block;margin:20px 0 8px">Context (optional)</label>
  <textarea class="reason-in" rows="2" placeholder="Anything worth remembering about where you’re at…" oninput="upNote(this.value)">${esc(d.note)}</textarea>`;
}
function upTitle(v) { const d = findD(route.decisionId); d.title = v; save(); syncGate(); }
function upNote(v) { const d = findD(route.decisionId); d.note = v; save(); }
function upSize(v) { const d = findD(route.decisionId); d.size = v; save(); render(); }
function syncGate() { // enable/disable Continue without full re-render (keeps typing focus)
  const d = findD(route.decisionId);
  const btn = document.querySelector('.wizfoot .btn-ink');
  const note = document.querySelector('.notice');
  const g = gateFor(d);
  if (btn) btn.disabled = !!g;
  if (note && !g) note.style.display = 'none';
  if (note && g) { note.style.display = ''; }
}

/* ---------- step 1: outcomes ---------- */
const OUTCOME_PROMPTS = ['An experience I want', 'A thing I want', 'Who I want around me', 'What I want to create for others'];
function stepOutcomes(d) {
  return `
  <h2 class="h2">What do you want?</h2>
  <span class="small">Every outcome you’re hoping this decision serves. Tag each one Now, Next, or Later — new outcomes start unsorted until you decide.<span class="info" tabindex="0">i<span class="tip"><b>Unsorted</b> — you haven’t placed it yet. Sit with it before you decide.<br><b>Now</b> — the priority. What this season of your life needs handled.<br><b>Next</b> — the transition. What you’re building toward once Now is taken care of.<br><b>Later</b> — the long game. The big dreams you’re keeping alive on purpose.</span></span></span>
  <div class="chips">${OUTCOME_PROMPTS.map(p => `<button class="chip" onclick="promptOutcome('${esc(p)}')">${p}</button>`).join('')}</div>
  <form class="bigadd" onsubmit="return addOutcome(event)">
    <input type="text" name="text" id="outcome-in" placeholder="I want…">
    <button class="btn btn-ink" type="submit"><i class="ph ph-plus"></i> Add</button>
  </form>
  <div class="list">
    ${d.outcomes.map(o => `
    <div class="ocard">
      <div class="row">
        <input class="txt line-edit" type="text" value="${esc(o.text)}" oninput="upOutcomeText('${o.id}',this.value)">
        <span class="seg">
          <button class="${!o.horizon ? 'on unset' : ''}" onclick="setHorizon('${o.id}',null)">&mdash;</button>
          <button class="${o.horizon === 'now' ? 'on' : ''}" onclick="setHorizon('${o.id}','now')">Now</button>
          <button class="${o.horizon === 'next' ? 'on' : ''}" onclick="setHorizon('${o.id}','next')">Next</button>
          <button class="${o.horizon === 'later' ? 'on' : ''}" onclick="setHorizon('${o.id}','later')">Later</button>
        </span>
        <button class="iconbtn danger" onclick="removeOutcome('${o.id}')"><i class="ph ph-x"></i></button>
      </div>
    </div>`).join('')}
  </div>`;
}
function promptOutcome(p) {
  const el = document.getElementById('outcome-in');
  if (el) { el.placeholder = p + '…'; el.focus(); }
}
function addOutcome(e) {
  e.preventDefault();
  const v = e.target.text.value.trim();
  if (v) {
    const d = findD(route.decisionId);
    d.outcomes.push({ id: uid(), text: v, reason: '', horizon: null });
    save(); render(); focusFirst();
  }
  return false;
}
function horizonPill(o) {
  const h = o.horizon === 'later' ? ['pill-big', 'Later'] : o.horizon === 'next' ? ['pill-open', 'Next'] : o.horizon === 'now' ? ['pill-little', 'Now'] : ['pill-unset', 'Unsorted'];
  return `<span class="pill ${h[0]}">${h[1]}</span>`;
}
function setHorizon(id, h) {
  const d = findD(route.decisionId);
  const o = d.outcomes.find(x => x.id === id);
  if (o) { o.horizon = h; save(); render(); }
}
function upOutcomeText(id, v) {
  const d = findD(route.decisionId);
  const o = d.outcomes.find(x => x.id === id);
  if (o) { o.text = v; save(); }
}
function removeOutcome(id) {
  const d = findD(route.decisionId);
  d.outcomes = d.outcomes.filter(o => o.id !== id); save(); render();
}

/* ---------- step 2: reasons ---------- */
function stepReasons(d) {
  return `
  <h2 class="h2">Why do you want each one?</h2>
  <span class="small">What will it give you — really? Name the emotion behind it.</span>
  <div class="list">
    ${d.outcomes.map(o => `
    <div class="ocard">
      <div class="row"><input class="txt line-edit" type="text" value="${esc(o.text)}" oninput="upOutcomeText('${o.id}',this.value)">
        ${horizonPill(o)}</div>
      <input class="reason-in" type="text" value="${esc(o.reason)}" placeholder="Because… (joy? freedom? security? growth? who it serves?)" oninput="upReason('${o.id}',this.value)">
    </div>`).join('')}
  </div>`;
}
function upReason(id, v) {
  const d = findD(route.decisionId);
  const o = d.outcomes.find(x => x.id === id);
  if (o) { o.reason = v; save(); }
}

/* ---------- step 3: order ---------- */
function stepOrder(d) {
  return `
  <h2 class="h2">Put them in order.</h2>
  <span class="small">Drag to rank. #1 is what this decision must serve <b>for this season of your life</b>. “Later” outcomes are kept on your Target list automatically.</span>
  <div class="list" data-drag="outcomes">
    ${d.outcomes.map((o, i) => `
    <div class="litem" draggable="true" data-id="${o.id}">
      <span class="grip"><i class="ph ph-dots-six-vertical"></i></span>
      <span class="rank" ${i === 0 ? 'style="color:var(--fl-magenta)"' : ''}>${i + 1}</span>
      <span class="txt" style="display:flex;flex-direction:column;gap:5px">
        <input class="line-edit" type="text" value="${esc(o.text)}" oninput="upOutcomeText('${o.id}',this.value)">
        ${o.reason ? `<span class="small">${esc(o.reason)}</span>` : ''}
      </span>
      ${horizonPill(o)}
    </div>`).join('')}
  </div>
  ${d.outcomes.length > 1 ? `<p class="small" style="margin-top:14px"><i class="ph ph-lightbulb"></i> Be rigorous — you can’t make everybody happy, a million dollars, and free time all from one decision. Which one wins?</p>` : ''}`;
}

/* ---------- step 4: options ---------- */
function stepOptions(d) {
  const n = d.options.length;
  return `
  <h2 class="h2">What are your options?</h2>
  <span class="small">Real choices need three or more. You may not like them all — list them anyway.</span>
  <div style="margin:4px 0 14px" class="counter">
    <span class="dots">${[0, 1, 2].map(i => `<i class="${n > i ? 'on' : ''}"></i>`).join('')}${n > 3 ? `<b style="color:var(--accent);font-size:.85rem;margin-left:4px">+${n - 3}</b>` : ''}</span>
    ${n === 0 ? 'No options yet' : n === 1 ? '1 option — that’s no option' : n === 2 ? '2 options — that’s a dilemma' : `${n} options — now it’s a choice`}
  </div>
  <form class="bigadd" onsubmit="return addOption(event)">
    <input type="text" name="text" placeholder="Option ${n + 1}…">
    <button class="btn btn-ink" type="submit"><i class="ph ph-plus"></i> Add</button>
  </form>
  <div class="list" data-drag="options">
    ${d.options.map((o, i) => `
    <div class="litem" draggable="true" data-id="${o.id}">
      <span class="grip"><i class="ph ph-dots-six-vertical"></i></span>
      <span class="rank">${String.fromCharCode(65 + i)}</span>
      <span class="txt" style="display:flex;align-items:center;gap:8px">
        <input class="line-edit" style="flex:1" type="text" value="${esc(o.text)}" oninput="upOptionText('${o.id}',this.value)">
        ${o.hybrid ? '<span class="hybrid-tag">Hybrid</span>' : ''}
      </span>
      <button class="iconbtn danger" onclick="removeOption('${o.id}')"><i class="ph ph-x"></i></button>
    </div>`).join('')}
  </div>`;
}
function addOption(e, extra) {
  if (e) e.preventDefault();
  const v = (extra != null ? extra : e.target.text.value).trim();
  if (v) {
    const d = findD(route.decisionId);
    d.options.push({ id: uid(), text: v, hybrid: !!extra, ups: [], downs: [] });
    save(); render(); focusFirst();
  }
  return false;
}
function upOptionText(id, v) {
  const d = findD(route.decisionId);
  const o = d.options.find(x => x.id === id);
  if (o) { o.text = v; save(); }
}
function removeOption(id) {
  const d = findD(route.decisionId);
  d.options = d.options.filter(o => o.id !== id);
  if (d.resolution && d.resolution.optionId === id) d.resolution = null;
  save(); render();
}

/* ---------- step 5: consequences ---------- */
function stepConsequences(d) {
  return `
  <h2 class="h2">Upsides &amp; downsides of each.</h2>
  <span class="small">To the best of your knowledge. Don’t judge yet — just get them on the page.</span>
  <div class="optgrid">
    ${d.options.map((o, i) => `
    <div class="opt">
      <div class="head"><span class="rank" style="font:700 .85rem/1 var(--font-display);color:var(--ink-4)">${String.fromCharCode(65 + i)}</span>
        <span class="name">${esc(o.text)}</span>${o.hybrid ? '<span class="hybrid-tag">Hybrid</span>' : ''}</div>
      <div class="updown">
        <div class="conlist up">
          <h5><i class="ph ph-arrow-up-right"></i> Upsides</h5>
          ${o.ups.map(c => conHTML(o.id, 'ups', c)).join('')}
          <form class="conadd" onsubmit="return addCon(event,'${o.id}','ups')">
            <input name="text" placeholder="Upside…"><button class="iconbtn" type="submit"><i class="ph ph-plus"></i></button>
          </form>
        </div>
        <div class="conlist down">
          <h5><i class="ph ph-arrow-down-right"></i> Downsides</h5>
          ${o.downs.map(c => conHTML(o.id, 'downs', c)).join('')}
          <form class="conadd" onsubmit="return addCon(event,'${o.id}','downs')">
            <input name="text" placeholder="Downside…"><button class="iconbtn" type="submit"><i class="ph ph-plus"></i></button>
          </form>
        </div>
      </div>
    </div>`).join('')}
  </div>`;
}
function conHTML(oid, side, c) {
  return `<div class="con"><input class="txt line-edit" type="text" value="${esc(c.text)}" oninput="upConText('${oid}','${side}','${c.id}',this.value)">
    <button class="iconbtn danger" style="width:26px;height:26px" onclick="removeCon('${oid}','${side}','${c.id}')"><i class="ph ph-x"></i></button></div>`;
}
function upConText(oid, side, cid, v) {
  const d = findD(route.decisionId);
  const c = d.options.find(x => x.id === oid)[side].find(x => x.id === cid);
  if (c) { c.text = v; save(); }
}
function addCon(e, oid, side) {
  e.preventDefault();
  const v = e.target.text.value.trim();
  if (v) {
    const d = findD(route.decisionId);
    const o = d.options.find(x => x.id === oid);
    o[side].push({ id: uid(), text: v, prob: 50, impact: 2, mitigation: '' });
    save(); render();
    setTimeout(() => { const f = document.querySelector(`form[onsubmit*="'${oid}','${side}'"] input`); if (f) f.focus(); }, 50);
  }
  return false;
}
function removeCon(oid, side, cid) {
  const d = findD(route.decisionId);
  const o = d.options.find(x => x.id === oid);
  o[side] = o[side].filter(c => c.id !== cid); save(); render();
}

/* ---------- step 6: evaluate ---------- */
function stepEvaluate(d) {
  const scores = d.options.map(o => ({ o, s: optionScore(o) }));
  const maxAbs = Math.max(1, ...scores.map(x => Math.abs(x.s.net)));
  return `
  <h2 class="h2">How likely is each consequence?</h2>
  <span class="small">Set probability and impact. The score is a signal, not the boss — you’re still the one deciding.</span>
  ${scores.map(({ o, s }, i) => `
  <div class="evalopt">
    <div class="head" style="display:flex;align-items:center;gap:10px">
      <span class="rank" style="font:700 .85rem/1 var(--font-display);color:var(--ink-4)">${String.fromCharCode(65 + i)}</span>
      <span class="name" style="font:600 1.02rem/1.3 var(--font-display);flex:1">${esc(o.text)}</span>
    </div>
    <div class="scoreline">
      <div class="scorebar">${s.net >= 0
        ? `<i style="left:50%;width:${(s.net / maxAbs) * 50}%;background:var(--success)"></i>`
        : `<i style="right:50%;width:${(-s.net / maxAbs) * 50}%;background:var(--danger)"></i>`}
        <i style="left:calc(50% - 1px);width:2px;background:var(--line-2)"></i>
      </div>
      <span class="scorenum" style="color:${s.net >= 0 ? 'var(--success)' : 'var(--danger)'}">${s.net >= 0 ? '+' : ''}${s.net.toFixed(1)}</span>
    </div>
    ${[...o.ups.map(c => ['ups', c]), ...o.downs.map(c => ['downs', c])].map(([side, c]) => `
    <div class="evalrow">
      <span><span class="sign" style="color:${side === 'ups' ? 'var(--success)' : 'var(--danger)'}">${side === 'ups' ? '+' : '−'}</span>${esc(c.text)}</span>
      <span class="sliderwrap">
        <input type="range" min="0" max="100" step="5" value="${c.prob}"
          oninput="this.nextElementSibling.value=this.value+'%'"
          onchange="setProb('${o.id}','${side}','${c.id}',this.value)">
        <output>${c.prob}%</output>
      </span>
      <span class="impactseg">${[1, 2, 3].map(v =>
        `<button class="${c.impact === v ? 'on' : ''}" onclick="setImpact('${o.id}','${side}','${c.id}',${v})">${['Low', 'Med', 'High'][v - 1]}</button>`).join('')}</span>
    </div>`).join('') || '<p class="small">No consequences listed for this option.</p>'}
  </div>`).join('')}`;
}
function setProb(oid, side, cid, v) {
  const d = findD(route.decisionId);
  const c = d.options.find(x => x.id === oid)[side].find(x => x.id === cid);
  c.prob = +v; save(); render();
}
function setImpact(oid, side, cid, v) {
  const d = findD(route.decisionId);
  const c = d.options.find(x => x.id === oid)[side].find(x => x.id === cid);
  c.impact = v; save(); render();
}

/* ---------- step 7: mitigate ---------- */
function stepMitigate(d) {
  const downs = d.options.flatMap(o => o.downs.map(c => ({ o, c, r: riskOf(c) }))).sort((a, b) => b.r - a.r);
  return `
  <h2 class="h2">Shrink the downsides.</h2>
  <span class="small">Biggest risks first. For each: how could you reduce it? Can you mix pieces of two options into a better one?</span>
  ${downs.length ? downs.map(({ o, c, r }) => `
  <div class="mitrow">
    <div class="top">
      <span class="riskpill ${riskClass(r)}">${riskLabel(r)}</span>
      <b style="flex:1;line-height:1.35">${esc(c.text)}</b>
      <span class="small" style="flex:none">${esc(o.text)} · ${c.prob}% · ${['low', 'med', 'high'][c.impact - 1]} impact</span>
    </div>
    <textarea placeholder="How could you reduce this risk?" oninput="setMit('${o.id}','${c.id}',this.value)">${esc(c.mitigation)}</textarea>
  </div>`).join('') : '<p class="small" style="margin:14px 0">No downsides recorded — either this is a beautiful decision, or go back and be honest with yourself.</p>'}
  <div style="background:var(--fl-gradient-soft);border-radius:var(--r-md);padding:16px 18px;margin-top:18px">
    <b style="font-family:var(--font-display)">Mix &amp; match:</b>
    <span style="color:var(--ink-2);font-size:.93rem"> seeing the pieces side by side, is there a hybrid option — the best parts of two paths combined?</span>
    <form class="addrow" onsubmit="return addHybrid(event)">
      <input name="text" placeholder="Name the hybrid option…">
      <button class="btn btn-primary btn-sm" type="submit"><i class="ph ph-git-merge"></i> Add hybrid</button>
    </form>
  </div>`;
}
function setMit(oid, cid, v) {
  const d = findD(route.decisionId);
  const c = d.options.find(x => x.id === oid).downs.find(x => x.id === cid);
  c.mitigation = v; save();
}
function addHybrid(e) {
  e.preventDefault();
  const v = e.target.text.value.trim();
  if (v) { addOption(null, v); }
  return false;
}

/* ---------- step 8: resolve ---------- */
function stepResolve(d) {
  const scores = d.options.map(o => ({ o, s: optionScore(o) })).sort((a, b) => b.s.net - a.s.net);
  const r = d.resolution || {};
  const chosenId = r.optionId || null;
  const defaultReview = (() => { const t = new Date(); t.setDate(t.getDate() + 21); return t.toISOString().slice(0, 10); })();
  if (d.status === 'resolved') {
    const chosen = d.options.find(o => o.id === d.resolution.optionId) || {};
    return `
    <div class="resolveband" style="text-align:center">
      <span class="eyebrow">Committed</span>
      <h2 class="h2" style="margin:8px 0 14px">${esc(d.title)}</h2>
      <p style="font-size:1.1rem;margin-bottom:6px">You chose: <b>${esc(chosen.text || '—')}</b></p>
      ${d.resolution.commitment ? `<p style="color:#FF9F2E;font:600 1.5rem/1.4 var(--font-hand);margin:14px 0">“${esc(d.resolution.commitment)}”</p>` : ''}
      <p class="small">First action: ${esc(d.resolution.firstAction || '—')} · Review on ${d.resolution.reviewDate || '—'}</p>
      <div style="margin-top:22px"><button class="btn btn-primary" onclick="backToDash()">Track it from the dashboard <i class="ph ph-arrow-right"></i></button></div>
    </div>`;
  }
  return `
  <div class="resolveband">
    <span class="eyebrow">Decide. Commit. Follow Through.</span>
    <h2 class="h2" style="margin:6px 0 4px">Make the call.</h2>
    <p class="small" style="margin-bottom:18px">Scores are advice. You are the decider.</p>
    ${scores.map(({ o, s }, i) => `
    <div class="choice ${chosenId === o.id ? 'on' : ''}" onclick="chooseOption('${o.id}')">
      <i class="ph ${chosenId === o.id ? 'ph-check-circle' : 'ph-circle'}" style="font-size:1.3rem;color:${chosenId === o.id ? '#00B4FF' : '#6B5A54'}"></i>
      <span class="cname">${esc(o.text)}${o.hybrid ? ' <span class="hybrid-tag">Hybrid</span>' : ''}</span>
      <span class="cscore">${s.net >= 0 ? '+' : ''}${s.net.toFixed(1)}${i === 0 ? ' · top score' : ''}</span>
    </div>`).join('')}
    <label class="caps">Your commitment — say it like you mean it</label>
    <input type="text" id="res-commit" placeholder="I’ve decided to… and I’m committed because…" value="${esc(r.commitment || '')}">
    <label class="caps">One action you’ll take today</label>
    <input type="text" id="res-action" placeholder="The very first domino…" value="${esc(r.firstAction || '')}">
    <label class="caps">Review the results on</label>
    <input type="date" id="res-date" value="${r.reviewDate || defaultReview}">
    <div style="margin-top:24px;text-align:center">
      <button class="btn btn-primary" style="font-size:1.02rem;padding:14px 34px" onclick="commitDecision()"><i class="ph ph-flag-checkered"></i> Commit To This Decision</button>
    </div>
  </div>`;
}
function chooseOption(oid) {
  const d = findD(route.decisionId);
  d.resolution = d.resolution || {};
  d.resolution.optionId = oid;
  d.resolution.commitment = (document.getElementById('res-commit') || {}).value || d.resolution.commitment || '';
  d.resolution.firstAction = (document.getElementById('res-action') || {}).value || d.resolution.firstAction || '';
  d.resolution.reviewDate = (document.getElementById('res-date') || {}).value || d.resolution.reviewDate || '';
  save(); render();
}
function commitDecision() {
  const d = findD(route.decisionId);
  if (!d.resolution || !d.resolution.optionId) { toast('Choose an option first — that’s the whole point.'); return; }
  d.resolution.commitment = (document.getElementById('res-commit') || {}).value || '';
  d.resolution.firstAction = (document.getElementById('res-action') || {}).value || '';
  d.resolution.reviewDate = (document.getElementById('res-date') || {}).value || '';
  d.resolution.resolvedAt = today();
  d.status = 'resolved';
  // unchosen options → the Trim list
  d.options.filter(o => o.id !== d.resolution.optionId).forEach(o => {
    state.trims.unshift({ id: uid(), text: o.text, from: d.title, date: today() });
  });
  // "later" outcomes → Target horizon list (dedup by text)
  d.outcomes.filter(o => o.horizon === 'later').forEach(o => {
    if (!state.targets.horizon.some(t => t.text.toLowerCase() === o.text.toLowerCase()))
      state.targets.horizon.push({ id: uid(), text: o.text });
  });
  save(); render();
  toast('Committed. Now follow through — that’s where life changes.');
}
function addLog(e, id) {
  e.preventDefault();
  const d = findD(id);
  const note = e.target.note.value.trim();
  const status = e.target.status.value;
  if (note) { d.logs = d.logs || []; d.logs.push({ id: uid(), date: today(), note, status }); save(); render(); }
  return false;
}
function markReviewed(id) {
  const d = findD(id); d.reviewDone = true; save(); render();
  toast('Review done. Decide → act → measure → adjust.');
}

/* =====================================================================
   drag & drop (shared)
   ===================================================================== */
function wireDrag() {
  document.querySelectorAll('[data-drag]').forEach(listEl => {
    let dragging = null;
    listEl.querySelectorAll('.litem[draggable]').forEach(item => {
      item.addEventListener('dragstart', e => {
        if (['INPUT', 'TEXTAREA'].includes(e.target.tagName)) { e.preventDefault(); return; }
        dragging = item; item.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move';
      });
      item.addEventListener('dragend', () => { if (dragging) dragging.classList.remove('dragging'); dragging = null; commitOrder(listEl); });
    });
    listEl.addEventListener('dragover', e => {
      e.preventDefault();
      if (!dragging) return;
      const after = [...listEl.querySelectorAll('.litem:not(.dragging)')].find(el => {
        const r = el.getBoundingClientRect();
        return e.clientY < r.top + r.height / 2;
      });
      if (after) listEl.insertBefore(dragging, after); else listEl.appendChild(dragging);
    });
  });
}
function commitOrder(listEl) {
  const ids = [...listEl.querySelectorAll('.litem')].map(el => el.dataset.id);
  const kind = listEl.dataset.drag;
  const reorder = arr => ids.map(id => arr.find(x => x.id === id)).filter(Boolean);
  if (kind === 'outcomes') { const d = findD(route.decisionId); d.outcomes = reorder(d.outcomes); }
  else if (kind === 'options') { const d = findD(route.decisionId); d.options = reorder(d.options); }
  else if (kind === 'target-now') state.targets.now = reorder(state.targets.now);
  else if (kind === 'target-horizon') state.targets.horizon = reorder(state.targets.horizon);
  save(); render();
}

/* =====================================================================
   import / export / toast
   ===================================================================== */
function exportJSON() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `muii-backup-${today()}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
  toast('Backup downloaded — your data, your file.');
}
function importJSON(ev) {
  const file = ev.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const s = JSON.parse(reader.result);
      if (!s || !Array.isArray(s.decisions)) throw new Error('bad');
      if (!confirm(`Import ${s.decisions.length} decision(s)? This replaces what’s currently in this browser.`)) return;
      s.targets = s.targets || { now: [], horizon: [] };
      s.trims = s.trims || [];
      state = s; save(); route = { view: 'dashboard', tab: 'track', decisionId: null }; render();
      toast('Imported. Welcome back.');
    } catch (e) { toast('That file doesn’t look like a Muii backup.'); }
  };
  reader.readAsText(file);
  ev.target.value = '';
}
let toastTimer = null;
function toast(msg) {
  document.querySelectorAll('.toast').forEach(t => t.remove());
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.remove(), 3200);
}

/* ---------- theme toggle ---------- */
const THEME_KEY = 'muii-theme';
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem(THEME_KEY, t);
  const btn = document.getElementById('theme-toggle');
  if (btn) btn.innerHTML = t === 'light' ? '<i class="ph ph-moon"></i> Dark' : '<i class="ph ph-sun"></i> Light';
}
function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme') === 'light' ? 'light' : 'dark';
  applyTheme(cur === 'light' ? 'dark' : 'light');
}
applyTheme(localStorage.getItem(THEME_KEY) || 'dark');

render();
</script>
